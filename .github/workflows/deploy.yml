name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build site
        run: npx hexo generate

      - name: Deploy to UsamiNeko.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PAT }}
          publish_dir: ./public
          external_repository: UsamiNeko/UsamiNeko.github.io
          publish_branch: main
          user_name: UsamiNeko
          user_email: usamineko@example.com
